<!DOCTYPE html>

<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>IQuizz App</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 shadow" style="width:500px">

<h2 class="text-center mb-4">Bienvenue au IQuizz</h2>

<!-- Mode -->

<label class="form-label">Mode de lecture</label>

<select id="mode" class="form-select mb-3">
<option value="" selected disabled>Choisir le mode</option>
<option value="normal">Mode Normal</option>
<option value="falc">Mode FALC</option>

</select>

<!-- Quiz Type -->

<label class="form-label">Type de Quiz</label>

<select id="quizType" class="form-select mb-3">
    
<option value="" selected disabled>Choisir le type de quiz</option>
<option value="general">Quiz Général (40 questions)</option>
<option value="practice">Practice par catégorie (10 questions)</option>

</select>

<!-- Category -->

<div id="categoryBox">

<label class="form-label">Catégorie</label>

<select id="category" class="form-select mb-3">


<option value="" selected disabled>Choisir la catégorie</option>
<option value="histoire">Histoire</option>

<option value="geographie">Géographie</option>

<option value="institutions">Institutions</option>

<option value="culture_civique">Culture civique</option>

<option value="valeurs_republique">Valeurs de la République</option>

<option value="symboles_france">Symboles de la France</option>

<option value="union_europeenne">Union européenne</option>

<option value="vie_france">Vie en France</option>

</select>

</select>

</div>

<button class="btn btn-primary w-100" onclick="startQuiz()">

Commencer

</button>

</div>

</div>

<script>







const quizType = document.getElementById("quizType")
const categoryBox = document.getElementById("categoryBox")


quizType.addEventListener("change", function(){

if(this.value === "general"){

category.disabled = true

}else{

category.disabled = false

}

})

quizType.addEventListener("change", function(){

if(this.value === "practice"){
categoryBox.style.display = "block"
}else{
categoryBox.style.display = "none"
}

})

function startQuiz(){

const mode = document.getElementById("mode").value
const quizType = document.getElementById("quizType").value
const category = document.getElementById("category").value

localStorage.setItem("mode", mode)
localStorage.setItem("quizType", quizType)
localStorage.setItem("category", category)


if(!mode || !quizType){
alert("Veuillez choisir le mode et le type de quiz")
return
}

if(quizType==="practice" && !category){
alert("Veuillez choisir une catégorie")
return
}

window.location.href = "quiz.html"
}

</script>

</body>
</html>
