<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Quiz</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f3f4f6;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.quiz-card{
max-width:700px;
width:100%;
border-radius:12px;
}

.answer-option{
border:1px solid #ddd;
border-radius:10px;
padding:12px;
cursor:pointer;
transition:0.2s;
display:flex;
align-items:center;
gap:10px;
}

.answer-option:hover{
background:#f7f8ff;
border-color:#4f6df5;
}

.answer-option.selected{
background:#e7edff;
border-color:#4f6df5;
}

.answer-option input{
margin-right:10px;
}

</style>

</head>

<body>

<div class="card quiz-card shadow p-4">

<div class="text-muted mb-2">
Institutions
</div>

<h4 class="mb-4">
Quelle est la résidence du président de la République ?
</h4>

<form id="quizForm">

<div class="row g-3">

<div class="col-md-6">
<label class="answer-option w-100">
<input type="checkbox" name="answer" value="versailles">
Château de Versailles
</label>
</div>

<div class="col-md-6">
<label class="answer-option w-100">
<input type="checkbox" name="answer" value="matignon">
Hôtel de Matignon
</label>
</div>

<div class="col-md-6">
<label class="answer-option w-100">
<input type="checkbox" name="answer" value="elysee">
L’Elysée
</label>
</div>

<div class="col-md-6">
<label class="answer-option w-100">
<input type="checkbox" name="answer" value="mairie">
Mairie de Paris
</label>
</div>

</div>

<button class="btn btn-primary w-100 mt-4">
Valider
</button>

</form>

</div>

<script>

const options = document.querySelectorAll(".answer-option")

options.forEach(option => {

const checkbox = option.querySelector("input")

checkbox.addEventListener("change", () => {

if(checkbox.checked){
option.classList.add("selected")
}else{
option.classList.remove("selected")
}

})

})

document.getElementById("quizForm").addEventListener("submit",function(e){

e.preventDefault()

let answers = []

document.querySelectorAll("input[name='answer']:checked")
.forEach(a => answers.push(a.value))

console.log("Selected answers:",answers)

alert("Réponse envoyée !")

})

</script>

</body>
</html>
